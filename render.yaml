services:
  - type: web
    name: qa-automation-academy-web
    runtime: static
    rootDir: qa-automation-academy-web
    buildCommand: corepack enable && pnpm install --frozen-lockfile=false && pnpm build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
