services:
  - type: static_site
    name: qa-automation-academy-web
    rootDir: qa-automation-academy-web
    buildCommand: corepack pnpm install --frozen-lockfile=false && corepack pnpm build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
